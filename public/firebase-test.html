<!DOCTYPE html>
<html>
<head>
    <title>Firebase Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>🔍 Firebase Connection Test</h1>
    <div id="results"></div>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const results = document.getElementById('results');

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCrw-lqoQ5_NbIyuDvEcihjzFEih-bE9eE",
            authDomain: "onfd-47648.firebaseapp.com",
            projectId: "onfd-47648",
            storageBucket: "onfd-47648.firebasestorage.app",
            messagingSenderId: "1076430300904",
            appId: "1:1076430300904:web:662c77393aec3ed9470b5d",
            measurementId: "G-YVMJN6C34J"
        };

        async function testConnection() {
            addResult('🔍 Starting Firebase Connection Test...', 'info');

            try {
                // Test 1: Initialize Firebase
                const app = initializeApp(firebaseConfig);
                addResult('✅ Firebase App Initialized', 'success');

                // Test 2: Test Auth
                const auth = getAuth(app);
                addResult('✅ Firebase Auth Connected', 'success');

                // Test 3: Test Firestore
                const db = getFirestore(app);
                addResult('✅ Firestore Connected', 'success');

                // Test 4: Try to access users collection
                const usersSnapshot = await getDocs(collection(db, 'users'));
                addResult(`✅ Users Collection Accessible (${usersSnapshot.docs.length} users found)`, 'success');

                // Test 5: Try to access menu collection
                const menuSnapshot = await getDocs(collection(db, 'menu'));
                addResult(`✅ Menu Collection Accessible (${menuSnapshot.docs.length} items found)`, 'success');

                addResult('🎉 ALL TESTS PASSED - Firebase is properly connected!', 'success');

            } catch (error) {
                addResult(`❌ Error: ${error.message}`, 'error');
                
                if (error.message.includes('permission-denied')) {
                    addResult('⚠️ Permission denied - Check Firestore rules', 'error');
                }
                if (error.message.includes('not-found')) {
                    addResult('⚠️ Project not found - Check Project ID', 'error');
                }
            }
        }

        // Run test when page loads
        testConnection();
    </script>
</body>
</html>
