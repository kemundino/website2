services:
  # Production React App
  - type: web
    name: restaurant-app
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - src/**/*.tsx
        - src/**/*.ts
        - public/**/*
        - package.json
        - package-lock.json
        - vite.config.ts
        - tailwind.config.js
        - tsconfig.json
        - postcss.config.js
        - index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://your-api-url.onrender.com
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyDMcUauUVvcB8bvLeH4ZkZCnWGaaP9QGzM
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: bitebuzz-restaurant.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: bitebuzz-restaurant
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: bitebuzz-restaurant.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: 250541683466
      - key: VITE_FIREBASE_APP_ID
        value: 1:250541683466:web:e502b14bce74b2451fc0f3
      - key: VITE_FIREBASE_MEASUREMENT_ID
        value: G-VL7K1664ZD

# Auto-deploy configuration
version: "1"
